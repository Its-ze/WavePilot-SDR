<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">WavePilot SDR icon</title>
  <desc id="desc">A navigation chevron over radio wave traces and waterfall bands.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="18" x2="226" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#142a2d"/>
      <stop offset="0.52" stop-color="#0b0f12"/>
      <stop offset="1" stop-color="#162024"/>
    </linearGradient>
    <linearGradient id="wave" x1="37" y1="154" x2="220" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#98e86b"/>
      <stop offset="0.45" stop-color="#42e8d2"/>
      <stop offset="1" stop-color="#f4c65b"/>
    </linearGradient>
    <linearGradient id="pilot" x1="91" y1="49" x2="174" y2="201" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f8f2"/>
      <stop offset="1" stop-color="#7cefe2"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feColorMatrix in="blur" values="0 0 0 0 0.258 0 0 0 0 0.910 0 0 0 0 0.824 0 0 0 0.72 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="14" y="14" width="228" height="228" rx="52" fill="url(#bg)"/>
  <rect x="24" y="25" width="208" height="206" rx="42" fill="none" stroke="#2d3b41" stroke-width="2"/>
  <g opacity="0.42">
    <rect x="39" y="191" width="178" height="7" rx="3.5" fill="#42e8d2"/>
    <rect x="39" y="204" width="132" height="7" rx="3.5" fill="#98e86b"/>
    <rect x="39" y="217" width="157" height="7" rx="3.5" fill="#f4c65b"/>
  </g>
  <path d="M38 157c25-45 43-45 66 0s42 45 67 0 32-45 47 0" fill="none" stroke="url(#wave)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M128 43 183 195 128 167 73 195Z" fill="url(#pilot)" stroke="#f5f8f2" stroke-width="7" stroke-linejoin="round"/>
  <path d="M128 43v124" fill="none" stroke="#0b1113" stroke-opacity="0.5" stroke-width="7" stroke-linecap="round"/>
  <circle cx="128" cy="128" r="11" fill="#0b1113" stroke="#f4c65b" stroke-width="5"/>
</svg>
