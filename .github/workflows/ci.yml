name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall wavepilot
      - run: python -m wavepilot.server --help
      - run: QT_QPA_PLATFORM=offscreen python -c "import wavepilot.desktop; import wavepilot.updater; print('desktop import ok')"
